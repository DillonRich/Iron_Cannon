name = "iron-cannon-golden-demo"
main = "worker/src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "golden-demo"
database_id = "local-golden-demo"

[[kv_namespaces]]
binding = "KV"
id = "local-golden-kv"

[vars]
APP_URL = "http://localhost:3000"
